name: Backend Integration Tests

on:
  push:
    branches:
      - '**'

jobs:
  backend-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation check
        run: npm run typecheck

      - name: Run backend integration tests and generate reports
        run: npm run test:integration:report

      - name: Verify mock backend scenario tests
        run: npm run test:integration -- --testNamePattern="mock backend"

      - name: Generate integration report markdown
        if: always()
        run: |
          mkdir -p reports/integration
          echo "# Backend Integration Report" > reports/integration/report.md
          echo "" >> reports/integration/report.md
          echo "- Commit: ${GITHUB_SHA}" >> reports/integration/report.md
          echo "- Generated (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> reports/integration/report.md
          if [ -f reports/integration/coverage/coverage-summary.json ]; then
            node -e "const fs=require('fs');const summary=JSON.parse(fs.readFileSync('reports/integration/coverage/coverage-summary.json','utf8'));const t=summary.total;console.log('- Lines: '+t.lines.pct+'%');console.log('- Statements: '+t.statements.pct+'%');console.log('- Branches: '+t.branches.pct+'%');console.log('- Functions: '+t.functions.pct+'%');" >> reports/integration/report.md
          else
            echo "- Coverage summary unavailable" >> reports/integration/report.md
          fi

      - name: Upload backend integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-report
          path: reports/integration
